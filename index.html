<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
<link rel="icon" type="image/png" href="./landing page/icon.png">
<title>Jazmine's 18th</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap');

* { padding: 0; margin: 0; box-sizing: border-box; font-family: "Great Vibes", cursive; }
body, html { width: 100%; height: 100%; overflow: hidden; }


#background-img{
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    z-index: -1;
}
/* Navbar */
.nav {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 80px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 50px;
    background: linear-gradient(rgba(255,182,193,0.3), transparent); /* baby pink gradient */
    z-index: 100;
}
.nav-logo p { color: white; font-size: 32px; font-weight: 600; }
.nav-menu ul { display: flex; gap: 25px; }
.nav-menu ul li { list-style: none; }
.nav-menu ul li a {
    text-decoration: none;
    font-weight: 500;
    color: white;
    padding-bottom: 5px;
}
.nav-menu ul li a:hover, .nav-menu ul li a.active { border-bottom: 2px solid #fff; }

/* Background Video */
#background-video {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: -1;
}

/* Main Wrapper */
.wrapper {
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

/* Heading */
.wrapper .content h1 {
    color: white;
    font-size: 4rem;
    margin-bottom: 30px;
    transform: translateY(-150px); /* slightly higher */
    text-shadow: 0 0 15px rgba(0,0,0,0.4);
}

/* Envelope Images */
/* Desktop */
.image-container {
    position: relative;
    width: 250px;
}

/* Mobile */
@media (max-width: 768px) {
    .image-container {
        width: 215px; /* adjust as needed */
    }
}



#envelope {
    width: 100%;
    height: auto;
    cursor: pointer;
    display: block;
}

/* Responsive */
@media(max-width: 600px){
    .wrapper .content h1 { font-size: 2rem; transform: translateY(-100px); }
}
</style>
</head>
<body>





<picture>
    <source media="(max-width: 768px)"
            srcset="./landing page/background-mobile-view.png">

    <img src="./landing page/background-pc-view.png"
         id="background-img">
</picture>
<!-- Main Wrapper -->
<div class="wrapper">


    <!-- Envelope Images -->
    <div class="image-container">
        <picture>
            <source media="(max-width: 768px)"
                srcset="./landing page/envelope-mobile.png">

            <img src="./landing page/envelope-pc.png"
                 id="envelope">
        </picture>
    </div>
</div>



<script>
document.getElementById("envelope").addEventListener("click", () => {
    window.location.href = "jasmineinvites/flipbook.html";
});

</script>

</body>
</html>
