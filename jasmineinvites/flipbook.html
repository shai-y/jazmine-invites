<!DOCTYPE html>
<html>
<head>
    <script src="https://kit.fontawesome.com/ccbe774c31.js" crossorigin="anonymous"></script> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>
    <link rel="icon" type="image/png" href="icon.png">
    <title>Jazmine's 18th</title>

    <style>

        
    body { 
        margin: 0;
        color: #696969;
        display: flex; 
        justify-content: center; 
        align-items: center; 
        min-height: 100vh; 
        width: 100vw;
        overflow: hidden;

        background-image: url("./flipbook-bg.png");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
    }


        #app { width:100vw; height:95vh; display:flex; flex-direction:column; justify-content:center; align-items:center; }


        .joint {
            width: 8px;
            background:
                linear-gradient(
                    to right,
                    rgba(0,0,0,0.25),
                    rgba(255,255,255,0.08),
                    rgba(0,0,0,0.25)
                );
        }
        .flipbook {
            width: 100vw;
            height: calc(100vh - 80px); /* leave space for top action bar */
            margin-top: 80px; /* push flipbook down below fixed action bar */
            filter: drop-shadow(0 10px 30px rgba(61, 8, 8, 0.726));
            perspective: 2000px;
        }

        .flipbook .viewport { 
            width: 90vw !important; 
            height: 100% !important; 
            margin: auto; 
        }

        /* top action bar */
        .action-bar {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 3000;  
        }

        .action-bar .btn {
            font-size: 34px;
            cursor: pointer;
            color: #7b7b7b;
            background: none;
            border: none;
            opacity: 0.8;
            transition: opacity 0.3s, transform 0.3s;
            user-select: none;
        }

        .action-bar .btn:hover { opacity: 1; transform: scale(1.1); }
        .action-bar .btn.disabled { color:#333; pointer-events:none; }
        .action-bar .page-num { font-size: 18px; margin:0 12px; }

        #musicButton {
            font-size: 30px;
            cursor: pointer;
            background:none;
            border:none;
            color:#7b7b7b;
            opacity:0.8;
            padding-top: 6px;
            transition: opacity 0.3s, transform 0.3s;
        }
        #musicButton:hover { opacity:1; transform:scale(1.1); }

        /* fireflies */
        .firefly-container { position: fixed; top:0; left:0; width:100vw; height:100vh; pointer-events:none; z-index:1; overflow:hidden; }
        .firefly { position:absolute; width:5px; height:5px; background:#c0be7b; border-radius:70%; box-shadow:0 0 15px 2px rgb(200,66,167),0 0 20px 5px rgba(253,251,211,0.3); opacity:0; animation:drift linear infinite, flicker ease-in-out infinite; }
        @keyframes drift {0%{transform:translate(0,0);}25%{transform:translate(100px,-50px);}50%{transform:translate(200px,20px);}75%{transform:translate(-50px,100px);}100%{transform:translate(0,0);}}
        @keyframes flicker {0%,100%{opacity:0;}50%{opacity:0.7;}}


        @media (max-width: 768px) {
            .action-bar .btn {
                font-size: 36px; /* larger for mobile */
                padding: 6px 10px;
        }

            #musicButton {
                font-size: 32px; /* larger for mobile */
        }

            .action-bar .page-num {
                font-size: 30px; /* bigger numbers */
        }
    }
    </style>
</head>
<body>
<div id="app">
    <!-- Fireflies -->
    <div class="firefly-container">
        <div v-for="n in 25" :key="n" class="firefly" :style="getFireflyStyle(n)"></div>
    </div>

    <!-- Top-centered action bar OUTSIDE flipbook -->
    <div class="action-bar" v-if="flipbook">
        <span class="btn left" :class="{disabled:!flipbook.canFlipLeft}" @click="flipbook.flipLeft()">&#9668;</span>
        <span class="btn plus" :class="{disabled:!flipbook.canZoomIn}" @click="flipbook.zoomIn()">+</span>
        <span class="page-num">{{ flipbook.page }} / {{ flipbook.numPages }}</span>
        <span class="btn minus" :class="{disabled:!flipbook.canZoomOut}" @click="flipbook.zoomOut()">-</span>
        <span class="btn right" :class="{disabled:!flipbook.canFlipRight}" @click="flipbook.flipRight()">&#9658;</span>
        <button id="musicButton" @click="toggleMusic">
            <i :class="musicMuted ? 'fa-solid fa-volume-xmark' : 'fa-solid fa-volume-high'"></i>
        </button>
    </div>

    <!-- Flipbook -->
    <flipbook ref="flipbook" :pages="pages" class="flipbook" v-slot="fb" @flip-left-start="playFlip" @flip-right-start="playFlip">
    </flipbook>
    

    <!-- Audio -->
    <audio id="flipSound" src="pageflip.mp3"></audio>
    <audio id="bgMusic" src="bgmusic.mp3" loop autoplay muted></audio>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://unpkg.com/flipbook-vue"></script>

<script>
const { createApp } = Vue;

createApp({
    data() {
        return {
            pages: [null,'1.png','2.png','3.png','hg1.png', 'hg2.png', '5.png','6.png','7.png','8.png','9.png','10.png','11.png'],
            musicMuted: true,
            flipbook: null
        }
    },
    mounted() {
        this.flipbook = this.$refs.flipbook;
    },
    methods:{
        playFlip(){
            const audio=document.getElementById('flipSound');
            if(audio){audio.currentTime=0; audio.play().catch(()=>{});}
        },
        toggleMusic(){
            const bg=document.getElementById('bgMusic');
            if(!bg) return;
            this.musicMuted ? (bg.muted=false,bg.play()) : (bg.muted=true);
            this.musicMuted = !this.musicMuted;
        },
        getFireflyStyle(index){
            const top = Math.random()*100+'vh';
            const left = Math.random()*100+'vw';
            const duration = (Math.random()*10+10)+'s';
            const delay = Math.random()*5+'s';
            const size = (Math.random()*4+2)+'px';
            return {top,left,width:size,height:size,animationDuration:`${duration},${duration}`,animationDelay:delay};
        }
    }
}).component('flipbook', Flipbook).mount('#app');
</script>
</body>
</html>
